name: Pull Request Checks

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build and Checks (${{ matrix.target }})
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Dependency Setup
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial

      - name: Test Harness Sanity
        run: |
          python -m py_compile tools/test_integration.py
          python tools/test_integration.py --help >/dev/null

      - name: Build Firmware
        run: |
          idf.py fullclean
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Upload PR Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ matrix.target }}-build
          path: |
            build/esp32os.bin
            build/esp32os.elf
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            sdkconfig
          if-no-files-found: error
