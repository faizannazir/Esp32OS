name: Pull Request Checks

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build and Checks (esp32 + esp32s3)
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    env:
      IDF_PATH: /opt/esp/idf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Harness Sanity
        run: |
          python3 -m py_compile tools/test_integration.py
          python3 -m py_compile tools/test_shell_host_integration.py
          python3 -m py_compile tools/test_build_health.py
          python3 tools/test_shell_host_integration.py

      - name: Build Firmware (esp32)
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          idf.py fullclean
          idf.py set-target esp32
          idf.py build

      - name: Validate Build Health (esp32)
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          python3 tools/test_build_health.py --target esp32

      - name: Package Artifacts (esp32)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/esp32
          cp build/esp32os.bin dist/esp32/esp32os-esp32.bin
          cp build/esp32os.elf dist/esp32/esp32os-esp32.elf
          cp build/bootloader/bootloader.bin dist/esp32/bootloader-esp32.bin
          cp build/partition_table/partition-table.bin dist/esp32/partition-table-esp32.bin
          cp sdkconfig dist/esp32/sdkconfig-esp32

      - name: Build Firmware (esp32s3)
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          idf.py fullclean
          idf.py set-target esp32s3
          idf.py build

      - name: Validate Build Health (esp32s3)
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          python3 tools/test_build_health.py --target esp32s3

      - name: Package Artifacts (esp32s3)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/esp32s3
          cp build/esp32os.bin dist/esp32s3/esp32os-esp32s3.bin
          cp build/esp32os.elf dist/esp32s3/esp32os-esp32s3.elf
          cp build/bootloader/bootloader.bin dist/esp32s3/bootloader-esp32s3.bin
          cp build/partition_table/partition-table.bin dist/esp32s3/partition-table-esp32s3.bin
          cp sdkconfig dist/esp32s3/sdkconfig-esp32s3

      - name: Upload PR Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-artifacts
          path: |
            dist/esp32/
            dist/esp32s3/
          if-no-files-found: error
