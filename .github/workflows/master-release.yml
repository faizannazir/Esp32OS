name: Master CI Build Test Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-test:
    name: Build and Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Dependency Setup
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial

      - name: Host Test Harness Checks
        run: |
          python -m py_compile tools/test_integration.py
          python tools/test_integration.py --help >/dev/null

      - name: Build Firmware
        run: |
          idf.py fullclean
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Package Output Files
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/${{ matrix.target }}"
          mkdir -p "$out_dir"

          cp build/esp32os.bin "$out_dir/esp32os-${{ matrix.target }}.bin"
          cp build/esp32os.elf "$out_dir/esp32os-${{ matrix.target }}.elf"
          cp build/bootloader/bootloader.bin "$out_dir/bootloader-${{ matrix.target }}.bin"
          cp build/partition_table/partition-table.bin "$out_dir/partition-table-${{ matrix.target }}.bin"

          if [ -f build/esp32os.map ]; then
            cp build/esp32os.map "$out_dir/esp32os-${{ matrix.target }}.map"
          fi

          if [ -f build/flasher_args.json ]; then
            cp build/flasher_args.json "$out_dir/flasher_args-${{ matrix.target }}.json"
          fi

          cp sdkconfig "$out_dir/sdkconfig-${{ matrix.target }}"

          (
            cd "$out_dir"
            zip -9 "esp32os-${{ matrix.target }}-artifacts.zip" ./*
          )

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32os-${{ matrix.target }}-artifacts
          path: dist/${{ matrix.target }}/
          if-no-files-found: error

  tag-release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    needs: [build-test]

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Combined Release Zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundle
          cp -R release-artifacts/* release-bundle/
          (
            cd release-bundle
            zip -r -9 ../esp32os-all-targets-artifacts.zip .
          )

      - name: Generate Auto Tag
        id: meta
        shell: bash
        run: |
          echo "tag=v$(date -u +'%Y.%m.%d')-r${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ESP32OS Automated Release ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.bin
            release-artifacts/**/*.elf
            release-artifacts/**/*.map
            release-artifacts/**/*.json
            release-artifacts/**/*.zip
            release-artifacts/**/sdkconfig-*
            esp32os-all-targets-artifacts.zip
