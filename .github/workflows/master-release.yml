name: Master CI Build Test Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-test:
    name: Build and Test (esp32 + esp32s3)
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    env:
      IDF_PATH: /opt/esp/idf

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Host Test Harness Checks
        run: |
          python3 -m py_compile tools/test_integration.py
          python3 -m py_compile tools/test_shell_host_integration.py
          python3 tools/test_shell_host_integration.py

      - name: Build Firmware (esp32)
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          idf.py fullclean
          idf.py set-target esp32
          idf.py build

      - name: Package Output Files (esp32)
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/esp32"
          mkdir -p "$out_dir"

          cp build/esp32os.bin "$out_dir/esp32os-esp32.bin"
          cp build/esp32os.elf "$out_dir/esp32os-esp32.elf"
          cp build/bootloader/bootloader.bin "$out_dir/bootloader-esp32.bin"
          cp build/partition_table/partition-table.bin "$out_dir/partition-table-esp32.bin"

          if [ -f build/esp32os.map ]; then
            cp build/esp32os.map "$out_dir/esp32os-esp32.map"
          fi

          if [ -f build/flasher_args.json ]; then
            cp build/flasher_args.json "$out_dir/flasher_args-esp32.json"
          fi

          cp sdkconfig "$out_dir/sdkconfig-esp32"

          (
            cd "$out_dir"
            zip -9 "esp32os-esp32-artifacts.zip" ./*
          )

      - name: Build Firmware (esp32s3)
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          idf.py fullclean
          idf.py set-target esp32s3
          idf.py build

      - name: Package Output Files (esp32s3)
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/esp32s3"
          mkdir -p "$out_dir"

          cp build/esp32os.bin "$out_dir/esp32os-esp32s3.bin"
          cp build/esp32os.elf "$out_dir/esp32os-esp32s3.elf"
          cp build/bootloader/bootloader.bin "$out_dir/bootloader-esp32s3.bin"
          cp build/partition_table/partition-table.bin "$out_dir/partition-table-esp32s3.bin"

          if [ -f build/esp32os.map ]; then
            cp build/esp32os.map "$out_dir/esp32os-esp32s3.map"
          fi

          if [ -f build/flasher_args.json ]; then
            cp build/flasher_args.json "$out_dir/flasher_args-esp32s3.json"
          fi

          cp sdkconfig "$out_dir/sdkconfig-esp32s3"

          (
            cd "$out_dir"
            zip -9 "esp32os-esp32s3-artifacts.zip" ./*
          )

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32os-build-artifacts
          path: |
            dist/esp32/
            dist/esp32s3/
          if-no-files-found: error

  tag-release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    needs: [build-test]

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Combined Release Zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bundle
          cp -R release-artifacts/* release-bundle/
          (
            cd release-bundle
            zip -r -9 ../esp32os-all-targets-artifacts.zip .
          )

      - name: Generate Auto Tag
        id: meta
        shell: bash
        run: |
          echo "tag=v$(date -u +'%Y.%m.%d')-r${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ESP32OS Automated Release ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.bin
            release-artifacts/**/*.elf
            release-artifacts/**/*.map
            release-artifacts/**/*.json
            release-artifacts/**/*.zip
            release-artifacts/**/sdkconfig-*
            esp32os-all-targets-artifacts.zip
